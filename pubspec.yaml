name: cajun_local
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  go_router: ^13.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  flutter_html: ^3.0.0
  google_fonts: ^6.2.1
  html: ^0.15.4
  url_launcher: ^6.2.0
  uuid: ^4.5.1
  purchases_flutter: ^9.12.3
  purchases_ui_flutter: ^9.12.3
  flutter_quill: ^11.5.0
  flutter_quill_delta_from_html: ^1.5.3
  vsc_quill_delta_to_html: ^1.0.5
  firebase_core: ^4.5.0
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^3.1.0
  google_sign_in: ^7.2.0
  flex_color_scheme: ^8.4.0
  json_annotation: ^4.9.0
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  riverpod_generator: ^2.6.5
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Brobane
      fonts:
        - asset: assets/fonts/Brobane.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  macos:
    generate: true
    image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"

